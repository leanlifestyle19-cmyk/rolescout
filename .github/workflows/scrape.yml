name: Scrape cluster jobs
on:
  schedule:
    - cron: "30 22 * * 0,3"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scraper.mjs
      - run: node careersgov.mjs
      - name: Commit data
        run: |
          git config user.name "rolescout-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/cluster-jobs.json
          git diff --cached --quiet || git commit -m "Update cluster jobs"
          git push